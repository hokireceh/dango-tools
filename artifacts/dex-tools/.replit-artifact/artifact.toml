kind = "web"
previewPath = "/"
title = "Dango DEX Tools"
version = "1.0.0"
id = "artifacts/dex-tools"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25020

[services.development]
run = "pnpm --filter @workspace/dex-tools run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dex-tools", "run", "build" ]
publicDir = "artifacts/dex-tools/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25020"
BASE_PATH = "/"
